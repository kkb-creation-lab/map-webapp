<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAP — Quotation & Delivery Order</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1e3a5f;
      --primary-light: #2b5280;
      --accent: #e8a020;
      --accent-light: #fef3e0;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
      --white: #ffffff;
      --sidebar-w: 240px;
      --radius: 8px;
      --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gray-50); color: var(--gray-800); font-size: 14px; min-height: 100vh; }

    /* ── SIDEBAR ── */
    #sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w);
      background: var(--primary); color: #c8d9ee; display: flex; flex-direction: column;
      z-index: 100; transition: transform .3s;
    }
    .logo-area { padding: 20px 18px 16px; border-bottom: 1px solid rgba(255,255,255,.1); }
    .logo-area .company-name { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; }
    .logo-area .company-sub { font-size: 11px; color: #90aac8; margin-top: 2px; }
    .logo-badge { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 10px; }

    nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
    .nav-section { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #6b8aaa; padding: 12px 8px 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px;
      cursor: pointer; transition: all .15s; color: #b0c8e0; font-size: 13.5px; font-weight: 500;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
    .nav-item.active { background: var(--accent); color: #fff; }
    .nav-item .icon { width: 20px; text-align: center; font-size: 16px; flex-shrink: 0; }

    /* ── MAIN ── */
    #main { margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50;
    }
    .topbar h1 { font-size: 20px; font-weight: 700; color: var(--gray-800); }
    .topbar .topbar-actions { display: flex; gap: 10px; align-items: center; }
    .content { padding: 28px; flex: 1; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius);
      font-size: 13.5px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-light); }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: #c98a18; }
    .btn-ghost { background: transparent; color: var(--gray-600); border: 1.5px solid var(--gray-300); }
    .btn-ghost:hover { background: var(--gray-100); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #15803d; }
    .btn-sm { padding: 6px 12px; font-size: 12.5px; }
    .btn-icon { padding: 7px 10px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── CARDS ── */
    .card { background: var(--white); border-radius: 10px; box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 16px; font-weight: 700; color: var(--gray-800); margin-bottom: 4px; }
    .card-subtitle { font-size: 13px; color: var(--gray-500); margin-bottom: 20px; }

    /* ── STAT CARDS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--white); border-radius: 10px; box-shadow: var(--shadow); padding: 20px; display: flex; align-items: center; gap: 16px; }
    .stat-icon { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .stat-value { font-size: 26px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 12px; color: var(--gray-500); margin-top: 3px; }

    /* ── FORM ── */
    .form-grid { display: grid; gap: 16px; }
    .form-grid-2 { grid-template-columns: 1fr 1fr; }
    .form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 12.5px; font-weight: 600; color: var(--gray-600); }
    .form-group input, .form-group select, .form-group textarea {
      padding: 9px 12px; border: 1.5px solid var(--gray-300); border-radius: var(--radius);
      font-size: 13.5px; color: var(--gray-800); background: var(--white); transition: border .15s;
      font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30,58,95,.1);
    }
    .form-group input[readonly] { background: var(--gray-100); color: var(--gray-600); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    /* ── ITEMS TABLE ── */
    .items-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .items-table th {
      background: var(--gray-100); padding: 10px 12px; text-align: left;
      font-size: 11.5px; font-weight: 700; color: var(--gray-600); text-transform: uppercase; letter-spacing: .5px;
      border-bottom: 2px solid var(--gray-200);
    }
    .items-table td { padding: 8px 6px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
    .items-table input, .items-table select {
      width: 100%; padding: 7px 10px; border: 1.5px solid var(--gray-200); border-radius: 6px;
      font-size: 13px; background: var(--white); font-family: inherit;
    }
    .items-table input:focus, .items-table select:focus {
      outline: none; border-color: var(--primary); background: #f0f6ff;
    }
    .items-table .col-no { width: 40px; text-align: center; color: var(--gray-400); font-weight: 600; }
    .items-table .col-desc { min-width: 200px; }
    .items-table .col-qty { width: 80px; }
    .items-table .col-unit { width: 80px; }
    .items-table .col-price { width: 130px; }
    .items-table .col-disc { width: 80px; }
    .items-table .col-amount { width: 140px; text-align: right; font-weight: 600; color: var(--gray-700); }
    .items-table .col-action { width: 44px; text-align: center; }
    .items-table .amount-cell { padding-right: 10px; font-weight: 600; }
    .items-table tbody tr:hover td { background: #f8fbff; }

    /* ── TOTALS ── */
    .totals-box { background: var(--gray-50); border-radius: 8px; padding: 16px 20px; max-width: 340px; margin-left: auto; }
    .totals-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 13.5px; }
    .totals-row.subtotal { color: var(--gray-600); }
    .totals-row.tax { color: var(--gray-600); }
    .totals-row.total { border-top: 2px solid var(--gray-300); margin-top: 6px; padding-top: 10px; font-size: 15px; font-weight: 800; color: var(--primary); }
    .totals-row span:last-child { font-weight: 600; }

    /* ── BADGES / STATUS ── */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
    .badge-draft { background: #f1f5f9; color: var(--gray-500); }
    .badge-sent { background: #dbeafe; color: #1d4ed8; }
    .badge-confirmed { background: #dcfce7; color: #15803d; }
    .badge-cancelled { background: #fee2e2; color: #dc2626; }
    .badge-delivered { background: #f0fdf4; color: #166534; }
    .badge-quotation { background: var(--accent-light); color: #92400e; }
    .badge-do { background: #e0f2fe; color: #0369a1; }

    /* ── TABLE LIST ── */
    .doc-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    .doc-table th { background: var(--gray-50); padding: 11px 16px; text-align: left; font-size: 12px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; border-bottom: 2px solid var(--gray-200); }
    .doc-table td { padding: 12px 16px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
    .doc-table tbody tr:hover td { background: #f8fbff; }
    .doc-table .doc-number { font-weight: 700; color: var(--primary); cursor: pointer; }
    .doc-table .doc-number:hover { text-decoration: underline; }

    /* ── DIVIDER ── */
    .section-divider { border: none; border-top: 1.5px solid var(--gray-200); margin: 22px 0; }

    /* ── ALERTS ── */
    .alert { border-radius: 8px; padding: 12px 16px; font-size: 13.5px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 10px; }
    .alert-info { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 60px 24px; color: var(--gray-400); }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .6; }
    .empty-state p { font-size: 15px; margin-bottom: 8px; color: var(--gray-500); font-weight: 600; }
    .empty-state small { font-size: 13px; }

    /* ── TABS ── */
    .tabs { display: flex; border-bottom: 2px solid var(--gray-200); margin-bottom: 20px; gap: 4px; }
    .tab { padding: 10px 18px; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 13.5px; font-weight: 600; color: var(--gray-500); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
    .tab:hover { background: var(--gray-100); color: var(--gray-700); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--white); }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 12px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-size: 17px; font-weight: 700; }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 10px; }

    /* ── PRINT STYLES ── */
    @media print {
      #sidebar, #main, .no-print { display: none !important; }
      #print-area { position: static !important; background: white !important; }
      #print-content { box-shadow: none !important; max-width: 100% !important; }
      @page { margin: 0; size: A4; }
    }
    .print-doc { display: none; }

    /* ── PRINT DOCUMENT ── */
    #print-area {
      display: none; position: fixed; inset: 0; background: #64748b; z-index: 9999;
      overflow: hidden; flex-direction: column;
    }
    #print-area.visible { display: flex; }
    .doc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 3px solid var(--primary); }
    .doc-company .name { font-size: 20px; font-weight: 900; color: var(--primary); }
    .doc-company .address { font-size: 12px; color: var(--gray-600); margin-top: 4px; line-height: 1.6; }
    .doc-title-area { text-align: right; }
    .doc-type-label { font-size: 28px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }
    .doc-number-label { font-size: 14px; color: var(--gray-600); margin-top: 4px; font-weight: 600; }
    .doc-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .doc-info-box { background: var(--gray-50); border-radius: 8px; padding: 14px 16px; }
    .doc-info-box .label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--gray-500); margin-bottom: 8px; }
    .doc-info-box .value { font-size: 13.5px; color: var(--gray-800); font-weight: 600; line-height: 1.5; }
    .doc-items-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; }
    .doc-items-table th { background: var(--primary); color: #fff; padding: 10px 12px; text-align: left; font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .doc-items-table td { padding: 10px 12px; border-bottom: 1px solid var(--gray-200); }
    .doc-items-table tr:last-child td { border-bottom: 2px solid var(--gray-300); }
    .doc-items-table .text-right { text-align: right; }
    .doc-items-table .text-center { text-align: center; }
    .doc-totals { display: flex; justify-content: flex-end; margin-bottom: 24px; }
    .doc-totals-inner { min-width: 280px; }
    .doc-total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
    .doc-total-row.grand { border-top: 2px solid var(--primary); margin-top: 6px; padding-top: 10px; font-size: 15px; font-weight: 800; color: var(--primary); }
    .doc-footer { display: flex; justify-content: space-between; margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--gray-200); }
    .doc-sign-box { text-align: center; }
    .doc-sign-box .sign-line { width: 160px; border-bottom: 1.5px solid var(--gray-400); margin: 48px auto 6px; }
    .doc-sign-box .sign-label { font-size: 12px; color: var(--gray-600); font-weight: 600; }
    .doc-sign-box .sign-name { font-size: 12.5px; color: var(--gray-700); margin-top: 3px; }
    .doc-notes { background: var(--accent-light); border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px 16px; margin-bottom: 20px; font-size: 12.5px; color: var(--gray-700); }

    /* ── SMART FILL ── */
    .sf-wrap { position: relative; }
    .sf-wrap input { padding-right: 28px; }
    .sf-badge {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      font-size: 10px; background: var(--primary); color: #fff; border-radius: 4px;
      padding: 1px 5px; pointer-events: none; font-weight: 700; letter-spacing: .3px;
      opacity: .7;
    }
    .sf-dropdown {
      position: absolute; top: calc(100% + 2px); left: 0; right: 0; z-index: 2000;
      background: var(--white); border: 1.5px solid var(--primary); border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12); max-height: 200px; overflow-y: auto;
      display: none;
    }
    .sf-dropdown.open { display: block; }
    .sf-item {
      padding: 9px 14px; cursor: pointer; font-size: 13.5px; color: var(--gray-800);
      border-bottom: 1px solid var(--gray-100); transition: background .1s;
    }
    .sf-item:last-child { border-bottom: none; }
    .sf-item:hover, .sf-item.focused { background: var(--accent-light); color: var(--primary); font-weight: 600; }
    .sf-item mark { background: none; color: var(--accent); font-weight: 700; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2,1fr); }
      .form-grid-3 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      #sidebar { transform: translateX(-100%); }
      #main { margin-left: 0; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .form-grid-2, .form-grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo-area">
    <div class="logo-badge">M</div>
    <div class="company-name">Mitra Agung Perkasa</div>
    <div class="company-sub">Quotation & DO System</div>
  </div>
  <nav>
    <div class="nav-section">Menu</div>
    <div class="nav-item active" onclick="showPage('dashboard')">
      <span class="icon">🏠</span> Dashboard
    </div>
    <div class="nav-section">Documents</div>
    <div class="nav-item" onclick="showPage('new-quotation')">
      <span class="icon">📄</span> New Quotation
    </div>
    <div class="nav-item" onclick="showPage('new-do')">
      <span class="icon">🚚</span> New Delivery Order
    </div>
    <div class="nav-section">Records</div>
    <div class="nav-item" onclick="showPage('history')">
      <span class="icon">📋</span> Document History
    </div>
  </nav>
</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <h1 id="page-title">Dashboard</h1>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- PRINT AREA -->
<div id="print-area">
  <!-- Toolbar -->
  <div class="no-print" style="position:sticky;top:0;z-index:10;background:#1e3a5f;padding:12px 28px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.3)">
    <span style="color:#fff;font-weight:700;font-size:14px;margin-right:auto">📄 Document Preview</span>
    <button class="btn btn-accent btn-sm" onclick="exportPDF()" id="pdf-btn">📥 Export PDF</button>
    <button class="btn btn-ghost btn-sm" style="border-color:#4a6fa5;color:#c8d9ee" onclick="window.print()">🖨️ Print</button>
    <button class="btn btn-ghost btn-sm" style="border-color:#4a6fa5;color:#c8d9ee" onclick="closePrintArea()">✕ Close</button>
  </div>
  <!-- A4 Paper -->
  <div style="background:#64748b;min-height:calc(100vh - 56px);padding:32px;overflow-y:auto">
    <div id="print-content" style="background:#fff;box-shadow:0 4px 40px rgba(0,0,0,.3);border-radius:4px;overflow:hidden;max-width:794px;margin:0 auto"></div>
  </div>
</div>

<!-- MODAL: Select Quotation for DO -->
<div class="modal-overlay" id="qt-select-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Select Quotation</h2>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="closeQtModal()">✕</button>
    </div>
    <div class="modal-body" id="qt-select-body"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   DATA LAYER — localStorage
═══════════════════════════════════════ */
const DB = {
  get: (key) => JSON.parse(localStorage.getItem('map_' + key) || '[]'),
  set: (key, val) => localStorage.setItem('map_' + key, JSON.stringify(val)),
  getObj: (key) => JSON.parse(localStorage.getItem('map_' + key) || 'null'),
  setObj: (key, val) => localStorage.setItem('map_' + key, JSON.stringify(val))
};

function getCounters() {
  return DB.getObj('counters') || { qt: {}, do: {} };
}
function saveCounters(c) { DB.setObj('counters', c); }

function nextNumber(type) {
  const d = new Date();
  const ym = `${String(d.getFullYear()).slice(-2)}${String(d.getMonth()+1).padStart(2,'0')}`;
  const c = getCounters();
  if (!c[type][ym]) c[type][ym] = 0;
  c[type][ym]++;
  saveCounters(c);
  const prefix = type === 'qt' ? 'QT' : 'DO';
  return `${prefix}-${ym}-${String(c[type][ym]).padStart(3,'0')}`;
}

function getQuotations() { return DB.get('quotations'); }
function saveQuotation(qt) {
  const list = getQuotations();
  const idx = list.findIndex(q => q.id === qt.id);
  if (idx >= 0) list[idx] = qt; else list.unshift(qt);
  DB.set('quotations', list);
}

function getDeliveryOrders() { return DB.get('delivery_orders'); }
function saveDeliveryOrder(doc) {
  const list = getDeliveryOrders();
  const idx = list.findIndex(d => d.id === doc.id);
  if (idx >= 0) list[idx] = doc; else list.unshift(doc);
  DB.set('delivery_orders', list);
}

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function fmt(n) {
  return Number(n||0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function today() {
  return new Date().toISOString().slice(0,10);
}
function fmtDate(d) {
  if (!d) return '-';
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${Number(day)} ${months[Number(m)-1]} ${y}`;
}
function statusBadge(s) {
  const map = { draft:'badge-draft', sent:'badge-sent', confirmed:'badge-confirmed', cancelled:'badge-cancelled', delivered:'badge-delivered' };
  return `<span class="badge ${map[s]||'badge-draft'}">${s||'draft'}</span>`;
}
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

/* ═══════════════════════════════════════
   SMART FILL ENGINE
═══════════════════════════════════════ */

// Collect all unique non-empty values for a field across all docs
function collectUnique(docs, fn) {
  const seen = new Set();
  docs.forEach(d => { const v = fn(d); if (v && v.trim()) seen.add(v.trim()); });
  return [...seen].sort((a,b) => a.localeCompare(b));
}

// Collect unique item descriptions from all docs
function collectItemDescs() {
  const seen = new Set();
  [...getQuotations(), ...getDeliveryOrders()].forEach(d => {
    (d.items||[]).forEach(i => { if (i.desc && i.desc.trim()) seen.add(i.desc.trim()); });
  });
  return [...seen].sort((a,b) => a.localeCompare(b));
}

// Build the smart fill data pool
function buildSfPool() {
  const qts = getQuotations();
  const dos = getDeliveryOrders();
  const all = [...qts, ...dos];
  return {
    customers:    collectUnique(all, d => d.customer),
    contacts:     collectUnique(all, d => d.customerContact),
    phones:       collectUnique(all, d => d.customerPhone),
    addresses:    collectUnique(all, d => d.customerAddress),
    inquiries:    collectUnique(qts, d => d.inquiryNumber),
    poNumbers:    collectUnique(dos, d => d.poNumber),
    shippers:     collectUnique(dos, d => d.shipper),
    vehicles:     collectUnique(dos, d => d.vehicleNo),
    drivers:      collectUnique(dos, d => d.driverName),
    itemDescs:    collectItemDescs()
  };
}

// Auto-fill sibling customer fields when customer name is selected
function autoFillCustomer(prefix, name) {
  if (!name) return;
  const all = [...getQuotations(), ...getDeliveryOrders()];
  const match = all.filter(d => d.customer === name)
                   .sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0))[0];
  if (!match) return;
  const fill = (id, val) => { const el = document.getElementById(id); if (el && !el.value && val) el.value = val; };
  fill(`${prefix}-contact`, match.customerContact);
  fill(`${prefix}-phone`,   match.customerPhone);
  fill(`${prefix}-address`, match.customerAddress);
}

// Attach smart-fill dropdown to a single text input
function sfAttach(inputId, values, onSelect) {
  const input = document.getElementById(inputId);
  if (!input || !values || values.length === 0) return;

  // Wrap input in relative container
  const parent = input.parentElement;
  parent.style.position = 'relative';

  // Add "SF" badge
  const badge = document.createElement('span');
  badge.className = 'sf-badge'; badge.textContent = '✦';
  parent.appendChild(badge);

  // Create dropdown
  const dd = document.createElement('div');
  dd.className = 'sf-dropdown';
  parent.appendChild(dd);

  let focusedIdx = -1;

  function render(query) {
    const q = (query||'').toLowerCase();
    const filtered = q
      ? values.filter(v => v.toLowerCase().includes(q))
      : values;
    if (filtered.length === 0) { dd.classList.remove('open'); return; }
    focusedIdx = -1;
    dd.innerHTML = filtered.slice(0, 30).map((v, i) => {
      const esc = v.replace(/</g,'&lt;');
      const hi  = q ? esc.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>') : esc;
      return `<div class="sf-item" data-val="${v.replace(/"/g,'&quot;')}" data-idx="${i}">${hi}</div>`;
    }).join('');
    dd.classList.add('open');
    dd.querySelectorAll('.sf-item').forEach(item => {
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        selectItem(item.dataset.val);
      });
    });
  }

  function selectItem(val) {
    input.value = val;
    dd.classList.remove('open');
    if (onSelect) onSelect(val);
    input.dispatchEvent(new Event('change'));
  }

  input.setAttribute('autocomplete', 'off');
  input.addEventListener('focus', () => render(input.value));
  input.addEventListener('input', () => render(input.value));
  input.addEventListener('blur',  () => setTimeout(() => dd.classList.remove('open'), 150));
  input.addEventListener('keydown', e => {
    const items = dd.querySelectorAll('.sf-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      focusedIdx = Math.min(focusedIdx + 1, items.length - 1);
      items.forEach((el,i) => el.classList.toggle('focused', i === focusedIdx));
      if (items[focusedIdx]) items[focusedIdx].scrollIntoView({ block:'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      focusedIdx = Math.max(focusedIdx - 1, 0);
      items.forEach((el,i) => el.classList.toggle('focused', i === focusedIdx));
    } else if (e.key === 'Enter' && focusedIdx >= 0 && dd.classList.contains('open')) {
      e.preventDefault();
      if (items[focusedIdx]) selectItem(items[focusedIdx].dataset.val);
    } else if (e.key === 'Escape') {
      dd.classList.remove('open');
    }
  });
}

// Attach smart fill to all text inputs in the QT form
function initSmartFillQt() {
  const pool = buildSfPool();
  sfAttach('qt-customer', pool.customers, val => autoFillCustomer('qt', val));
  sfAttach('qt-contact',  pool.contacts);
  sfAttach('qt-phone',    pool.phones);
  sfAttach('qt-address',  pool.addresses);
  sfAttach('qt-ref',      pool.inquiries);
}

// Attach smart fill to all text inputs in the DO form
function initSmartFillDo() {
  const pool = buildSfPool();
  sfAttach('do-customer',  pool.customers, val => autoFillCustomer('do', val));
  sfAttach('do-contact',   pool.contacts);
  sfAttach('do-phone',     pool.phones);
  sfAttach('do-address',   pool.addresses);
  sfAttach('do-po-number', pool.poNumbers);
  sfAttach('do-shipper',   pool.shippers);
}

// Attach smart fill to a single item description input (called per row)
function sfItemDesc(inputEl) {
  if (!inputEl) return;
  const values = collectItemDescs();
  if (!values.length) return;
  const parent = inputEl.parentElement;
  parent.style.position = 'relative';
  const dd = document.createElement('div');
  dd.className = 'sf-dropdown';
  parent.appendChild(dd);
  let focusedIdx = -1;

  function render(query) {
    const q = (query||'').toLowerCase();
    const filtered = q ? values.filter(v => v.toLowerCase().includes(q)) : values;
    if (!filtered.length) { dd.classList.remove('open'); return; }
    focusedIdx = -1;
    dd.innerHTML = filtered.slice(0,20).map((v,i) => {
      const esc = v.replace(/</g,'&lt;');
      const hi  = q ? esc.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>') : esc;
      return `<div class="sf-item" data-val="${v.replace(/"/g,'&quot;')}" data-idx="${i}">${hi}</div>`;
    }).join('');
    dd.classList.add('open');
    dd.querySelectorAll('.sf-item').forEach(item => {
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        inputEl.value = item.dataset.val;
        dd.classList.remove('open');
      });
    });
  }
  inputEl.setAttribute('autocomplete','off');
  inputEl.addEventListener('focus', () => render(inputEl.value));
  inputEl.addEventListener('input', () => render(inputEl.value));
  inputEl.addEventListener('blur',  () => setTimeout(() => dd.classList.remove('open'), 150));
  inputEl.addEventListener('keydown', e => {
    const items = dd.querySelectorAll('.sf-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); focusedIdx = Math.min(focusedIdx+1, items.length-1); items.forEach((el,i) => el.classList.toggle('focused', i===focusedIdx)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); focusedIdx = Math.max(focusedIdx-1, 0); items.forEach((el,i) => el.classList.toggle('focused', i===focusedIdx)); }
    else if (e.key === 'Enter' && focusedIdx >= 0 && dd.classList.contains('open')) { e.preventDefault(); if(items[focusedIdx]) { inputEl.value = items[focusedIdx].dataset.val; dd.classList.remove('open'); } }
    else if (e.key === 'Escape') dd.classList.remove('open');
  });
}

      <td class="col-disc"><input type="number" min="0" max="100" step="any" value="${item.disc||0}" onchange="qtItems[${i}].disc=parseFloat(this.value)||0;recalcQt()" /></td>

function addQtItem() {
  qtItems.push({ desc:'', qty:1, unit:'pcs', price:0, disc:0, amount:0 });
  renderQtItems(); recalcQt();
  setTimeout(() => {
    document.querySelectorAll('#qt-items-body .sf-desc-input').forEach(sfItemDesc);
  }, 20);
}
function removeQtItem(i) {
  qtItems.splice(i,1);
  renderQtItems(); recalcQt();
}
function recalcQt() {
  let subtotal = 0;
  qtItems.forEach((item, i) => {
    const amt = item.qty * item.price * (1 - (item.disc||0)/100);
    item.amount = amt; subtotal += amt;
    const el = document.getElementById(`qt-amt-${i}`);
    if (el) el.textContent = fmt(amt);
  });
  const taxRate = parseFloat(document.getElementById('qt-tax')?.value || 11) / 100;
  const tax = subtotal * taxRate;
  const grand = subtotal + tax;
  const el = document.getElementById('qt-totals');
  if (el) el.innerHTML = `
    <div class="totals-box">
      <div class="totals-row subtotal"><span>Subtotal</span><span>IDR ${fmt(subtotal)}</span></div>
      <div class="totals-row tax"><span>Tax (${taxRate*100}%)</span><span>IDR ${fmt(tax)}</span></div>
      <div class="totals-row total"><span>TOTAL</span><span>IDR ${fmt(grand)}</span></div>
    </div>`;
  return { subtotal, tax, grand };
}

function saveQtForm(e, id, isEdit) {
  e.preventDefault();
  // Read fresh inputs from DOM
  qtItems.forEach((item, i) => {
    const rows = document.querySelectorAll('#qt-items-body tr');
    if (rows[i]) {
      const inputs = rows[i].querySelectorAll('input');
      item.desc = inputs[0].value;
      item.qty = parseFloat(inputs[1].value)||0;
      item.unit = inputs[2].value;
      item.price = parseFloat(inputs[3].value)||0;
      item.disc = parseFloat(inputs[4].value)||0;
      item.amount = item.qty * item.price * (1 - item.disc/100);
    }
  });
  const taxRate = parseFloat(document.getElementById('qt-tax').value) / 100;
  const subtotal = qtItems.reduce((s,i) => s + i.amount, 0);
  const tax = subtotal * taxRate;
  const grandTotal = subtotal + tax;

  const doc = {
    id, number: document.getElementById('qt-number').value,
    date: document.getElementById('qt-date').value,
    validUntil: document.getElementById('qt-valid').value,
    customer: document.getElementById('qt-customer').value,
    customerContact: document.getElementById('qt-contact').value,
    customerPhone: document.getElementById('qt-phone').value,
    customerAddress: document.getElementById('qt-address').value,
    inquiryNumber: document.getElementById('qt-ref').value,
    paymentTerms: document.getElementById('qt-payment').value,
    taxRate: taxRate*100, tax, subtotal, grandTotal,
    status: document.getElementById('qt-status').value,
    notes: document.getElementById('qt-notes').value,
    terms: document.getElementById('qt-terms').value,
    items: JSON.parse(JSON.stringify(qtItems)),
    createdAt: new Date().toISOString()
  };
  saveQuotation(doc);
  showNotification('✅ Quotation saved successfully!', 'success');
  showPage('history');
}

function renderDoItems() {
  const tbody = document.getElementById('do-items-body');
  if (!tbody) return;
  tbody.innerHTML = doItems.map((item, i) => `
    <tr>
      <td class="col-no">${i+1}</td>
      <td class="col-desc"><input type="text" class="sf-desc-input" value="${item.desc||''}" onchange="doItems[${i}].desc=this.value" placeholder="Item description..." autocomplete="off" /></td>
      <td class="col-qty"><input type="number" min="0" step="any" value="${item.qty||1}" onchange="doItems[${i}].qty=parseFloat(this.value)||0" /></td>
      <td class="col-unit"><input type="text" value="${item.unit||'pcs'}" onchange="doItems[${i}].unit=this.value" /></td>
      <td><input type="text" value="${item.notes||''}" onchange="doItems[${i}].notes=this.value" placeholder="Optional note..." /></td>
      <td class="col-action"><button type="button" class="btn btn-danger btn-icon btn-sm" onclick="removeDoItem(${i})" ${doItems.length<=1?'disabled':''}>✕</button></td>
    </tr>
  `).join('');
  setTimeout(() => {
    document.querySelectorAll('#do-items-body .sf-desc-input').forEach(sfItemDesc);
  }, 20);
}
function addDoItem() {
  doItems.push({ desc:'', qty:1, unit:'pcs', notes:'' });
  renderDoItems();
  setTimeout(() => {
    document.querySelectorAll('#do-items-body .sf-desc-input').forEach(sfItemDesc);
  }, 20);
}
function removeDoItem(i) { doItems.splice(i,1); renderDoItems(); }

function saveDOForm(e, id, isEdit) {
  e.preventDefault();
  doItems.forEach((item, i) => {
    const rows = document.querySelectorAll('#do-items-body tr');
    if (rows[i]) {
      const inputs = rows[i].querySelectorAll('input');
      item.desc = inputs[0].value;
      item.qty = parseFloat(inputs[1].value)||0;
      item.unit = inputs[2].value;
      item.notes = inputs[3].value;
    }
  });
  const doc = {
    id, number: document.getElementById('do-number').value,
    date: document.getElementById('do-date').value,
    deliveryDate: document.getElementById('do-delivery-date').value,
    customer: document.getElementById('do-customer').value,
    customerContact: document.getElementById('do-contact').value,
    customerPhone: document.getElementById('do-phone').value,
    customerAddress: document.getElementById('do-address').value,
    poNumber: document.getElementById('do-po-number').value,
    shipper: document.getElementById('do-shipper').value,
    notes: document.getElementById('do-notes').value,
    status: document.getElementById('do-status').value,
    items: JSON.parse(JSON.stringify(doItems)),
    createdAt: new Date().toISOString()
  };
  saveDeliveryOrder(doc);
  showNotification('✅ Delivery Order saved successfully!', 'success');
  showPage('history');
}

/* ═══════════════════════════════════════

function openQtSelectModal() {
  const qts = getQuotations().filter(q => q.status !== 'cancelled');
  const body = document.getElementById('qt-select-body');
  if (qts.length === 0) {
    body.innerHTML = '<div class="empty-state"><div class="empty-icon">📄</div><p>No quotations available</p></div>';
  } else {
    body.innerHTML = `
      <p style="color:var(--gray-600);margin-bottom:14px;font-size:13px">Select a quotation to import its items and customer info into the delivery order.</p>
      <table class="doc-table">
        <thead><tr><th>Number</th><th>Customer</th><th>Date</th><th>Status</th><th></th></tr></thead>
        <tbody>${qts.map(q => `
          <tr>
            <td style="font-weight:700;color:var(--primary)">${q.number}</td>
            <td>${q.customer}</td>
            <td>${fmtDate(q.date)}</td>
            <td>${statusBadge(q.status)}</td>
            <td><button class="btn btn-primary btn-sm" onclick="importFromQt('${q.id}')">Import</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }
  document.getElementById('qt-select-modal').classList.add('open');
}
function closeQtModal() { document.getElementById('qt-select-modal').classList.remove('open'); }
function importFromQt(qtId) {
  const qt = getQuotations().find(q => q.id === qtId);
  if (!qt) return;
  document.getElementById('do-customer').value = qt.customer||'';
  document.getElementById('do-contact').value = qt.customerContact||'';
  document.getElementById('do-phone').value = qt.customerPhone||'';
  document.getElementById('do-address').value = qt.customerAddress||'';
  // Customer PO number is filled manually — not copied from quotation
  doItems = qt.items.map(i => ({ desc: i.desc, qty: i.qty, unit: i.unit, notes:'' }));
  renderDoItems();
  closeQtModal();
  showNotification(`✅ Imported from ${qt.number}`, 'success');
}

          ${docs.map(doc => `

              <td>${doc._type === 'quotation' ? '<span class="badge badge-quotation">Quotation</span>' : '<span class="badge badge-do">Delivery Order</span>'}</td>

                <div style="display:flex;gap:6px;justify-content:center">
                  <button class="btn btn-ghost btn-icon btn-sm" title="Preview & Print" onclick="previewDoc('${doc._type==='quotation'?'qt':'do'}','${doc.id}')">🖨️</button>
                  <button class="btn btn-ghost btn-icon btn-sm" title="Edit" onclick="editDoc('${doc._type==='quotation'?'qt':'do'}','${doc.id}')">✏️</button>
                  <button class="btn btn-danger btn-icon btn-sm" title="Delete" onclick="deleteDoc('${doc._type==='quotation'?'qt':'do'}','${doc.id}')">🗑️</button>

          `).join('')}
        </tbody>
      </table>`}

  `;
}

function editDoc(type, id) {
  if (type === 'qt') {
    const doc = getQuotations().find(q => q.id === id);
    if (doc) { qtItems = JSON.parse(JSON.stringify(doc.items)); showPage('new-quotation', doc); }
  } else {
    const doc = getDeliveryOrders().find(d => d.id === id);
    if (doc) { doItems = JSON.parse(JSON.stringify(doc.items)); showPage('new-do', doc); }
  }
}

function deleteDoc(type, id) {
  if (!confirm('Are you sure you want to delete this document? This action cannot be undone.')) return;
  if (type === 'qt') {
    const list = getQuotations().filter(q => q.id !== id);
    DB.set('quotations', list);
  } else {
    const list = getDeliveryOrders().filter(d => d.id !== id);
    DB.set('delivery_orders', list);
  }
  showNotification('🗑️ Document deleted.', 'success');
  renderHistory();
}

   PRINT / PREVIEW
═══════════════════════════════════════ */
let currentPrintDocId = '';
let currentPrintDocType = '';

function previewDoc(type, id) {
  currentPrintDocType = type;
  currentPrintDocId = id;
  let html = '';
  if (type === 'qt') {
    const doc = getQuotations().find(q => q.id === id);
    if (!doc) return;
    html = buildQtHTML(doc);
  } else {
    const doc = getDeliveryOrders().find(d => d.id === id);
    if (!doc) return;
    html = buildDOHTML(doc);
  }
  document.getElementById('print-content').innerHTML = html;
  document.getElementById('print-area').classList.add('visible');
}

function closePrintArea() {
  document.getElementById('print-area').classList.remove('visible');
}

function exportPDF() {
  const el = document.getElementById('print-content');
  const btn = document.getElementById('pdf-btn');
  const docType = currentPrintDocType === 'qt' ? 'Quotation' : 'DeliveryOrder';

  // Get doc number for filename
  let docNum = 'document';
  if (currentPrintDocType === 'qt') {
    const doc = getQuotations().find(q => q.id === currentPrintDocId);
    if (doc) docNum = doc.number;
  } else {
    const doc = getDeliveryOrders().find(d => d.id === currentPrintDocId);
    if (doc) docNum = doc.number;
  }
  const filename = `MAP_${docNum}.pdf`;

  if (btn) { btn.textContent = '⏳ Generating...'; btn.disabled = true; }

  const opt = {
    margin: 0,
    filename: filename,
    image: { type: 'jpeg', quality: 0.99 },
    html2canvas: { scale: 2.5, useCORS: true, logging: false, letterRendering: true },
    jsPDF: currentPrintDocType === 'do'
      ? { unit: 'mm', format: 'a4', orientation: 'portrait' }
      : { unit: 'px', format: [794, 1123], orientation: 'portrait', hotfixes: ['px_scaling'] }
  };
  html2pdf().set(opt).from(el).save().then(() => {
    if (btn) { btn.textContent = '📥 Export PDF'; btn.disabled = false; }
    showNotification(`✅ PDF saved: ${filename}`, 'success');
  });
}

        <div style="display:flex;justify-content:space-between;padding:10px 0 5px;font-size:15px;font-weight:800;color:#1e3a5f;border-top:2px solid #1e3a5f;margin-top:6px">
          <span>GRAND TOTAL</span><span>IDR ${fmt(doc.grandTotal)}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- NOTES & TERMS -->
  ${doc.notes ? `
  <div style="padding:0 40px 14px">
    <div style="background:#fef3e0;border-left:4px solid #e8a020;border-radius:4px;padding:12px 16px;font-size:12px;color:#78350f">
      <strong>Notes to Customer:</strong><br>${doc.notes}
    </div>
  </div>` : ''}
  ${doc.terms ? `
  <div style="padding:0 40px 20px">
    <div style="background:#f8fafc;border-left:4px solid #cbd5e1;border-radius:4px;padding:12px 16px;font-size:11.5px;color:#64748b;line-height:1.7">
      <strong style="color:#475569">Terms & Conditions:</strong><br>${doc.terms.replace(/\n/g,'<br>')}
    </div>
  </div>` : ''}

  <!-- SIGNATURES -->
  <div style="padding:20px 40px 28px;display:flex;justify-content:space-between;border-top:1.5px solid #e2e8f0;margin-top:8px">
    <div style="text-align:center">
      <div style="font-size:11px;color:#94a3b8;margin-bottom:2px">Prepared by,</div>
      <div style="width:180px;border-bottom:1.5px solid #94a3b8;margin:52px auto 8px"></div>
      <div style="font-size:12px;font-weight:700;color:#334155">Mitra Agung Perkasa</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:2px">Authorized Signature</div>
    </div>
    <div style="text-align:center">
      <div style="font-size:11px;color:#94a3b8;margin-bottom:2px">Agreed & Acknowledged by,</div>
      <div style="width:180px;border-bottom:1.5px solid #94a3b8;margin:52px auto 8px"></div>
      <div style="font-size:12px;font-weight:700;color:#334155">${doc.customer||'Customer'}</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:2px">Name & Stamp</div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div style="background:linear-gradient(135deg,#1e3a5f 0%,#2b5280 100%);height:6px;width:100%;margin-top:auto"></div>
  <div style="text-align:center;font-size:10px;color:#94a3b8;padding:6px 0">
    This document is computer generated — Mitra Agung Perkasa &nbsp;|&nbsp; ${doc.number}
  </div>
</div>`;
}

function buildDOHalf(doc, copyLabel, accentColor) {
  /* Compact half-A4 layout — approx 510px tall */
  const copyBg = accentColor === '#0369a1' ? '#e0f2fe' : '#f0fdf4';
  const rows = doc.items.map((item, i) => `
    <tr style="background:${i%2===0?'#fff':'#f8fafc'}">
      <td style="padding:5px 7px;text-align:center;color:#94a3b8;font-size:11px;border-bottom:1px solid #e2e8f0">${i+1}</td>
      <td style="padding:5px 7px;border-bottom:1px solid #e2e8f0;font-size:11.5px">${item.desc||'-'}</td>
      <td style="padding:5px 7px;text-align:center;border-bottom:1px solid #e2e8f0;font-size:11.5px;font-weight:600">${item.qty}</td>
      <td style="padding:5px 7px;text-align:center;border-bottom:1px solid #e2e8f0;font-size:11.5px;color:#64748b">${item.unit||'pcs'}</td>
      <td style="padding:5px 7px;border-bottom:1px solid #e2e8f0;font-size:11px;color:#64748b">${item.notes||'-'}</td>
      <td style="padding:5px 7px;text-align:center;border-bottom:1px solid #e2e8f0;font-size:14px">&#9744;</td>
    </tr>`).join('');

  return `<div style="font-family:'Segoe UI',Arial,sans-serif;color:#1e293b;background:#fff;box-sizing:border-box">
  <div style="background:${accentColor};height:5px;width:100%"></div>
  <div style="background:${copyBg};padding:3px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid ${accentColor}22">
    <span style="font-size:10px;color:${accentColor};font-weight:700">MITRA AGUNG PERKASA &mdash; DELIVERY ORDER</span>
    <span style="background:${accentColor};color:#fff;font-size:9.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;padding:2px 10px;border-radius:99px">${copyLabel}</span>
  </div>
  <div style="padding:10px 28px 8px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1.5px solid #e2e8f0">
    <div>
      <div style="font-size:16px;font-weight:900;color:#1e3a5f;line-height:1">MITRA AGUNG PERKASA</div>
      <div style="font-size:10px;color:#64748b;margin-top:3px;line-height:1.7">Jl. Kelapa Puan AE 1 No. 8, Pakulonan Barat, Kelapa Dua &mdash; Tangerang</div>
    </div>
    <div style="text-align:right">
      <div style="background:${accentColor};color:#fff;font-size:12px;font-weight:900;letter-spacing:1.5px;padding:5px 13px;border-radius:5px;display:inline-block">DELIVERY ORDER</div>
      <div style="margin-top:5px;font-size:13px;font-weight:700;color:${accentColor}">${doc.number}</div>
      <div style="font-size:10.5px;color:#64748b;line-height:1.7">
        Date: <strong style="color:#334155">${fmtDate(doc.date)}</strong>
        ${doc.deliveryDate ? `&nbsp;&nbsp;Delivery: <strong style="color:#334155">${fmtDate(doc.deliveryDate)}</strong>` : ''}
      </div>
    </div>
  </div>
  <div style="padding:8px 28px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div style="background:#f8fafc;border-radius:6px;padding:8px 12px;border-left:3px solid ${accentColor}">
      <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-bottom:5px">Deliver To</div>
      <div style="font-size:12px;font-weight:700;color:#1e293b">${doc.customer||'-'}</div>
      ${doc.customerAddress ? `<div style="font-size:10.5px;color:#64748b;margin-top:2px">${doc.customerAddress}</div>` : ''}
      ${doc.customerContact ? `<div style="font-size:10.5px;color:#64748b;margin-top:1px">Attn: ${doc.customerContact}</div>` : ''}
      ${doc.customerPhone   ? `<div style="font-size:10.5px;color:#64748b;margin-top:1px">${doc.customerPhone}</div>` : ''}
    </div>
    <div style="background:#f8fafc;border-radius:6px;padding:8px 12px;border-left:3px solid #e8a020">
      <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-bottom:5px">Shipment Details</div>
      ${doc.poNumber ? `<div style="font-size:10.5px;color:#64748b;margin-bottom:2px">Customer PO: <strong style="color:#1e293b">${doc.poNumber}</strong></div>` : ''}
      ${doc.shipper  ? `<div style="font-size:10.5px;color:#64748b;margin-bottom:2px">Shipper: <strong style="color:#1e293b">${doc.shipper}</strong></div>` : ''}
      <div style="font-size:10.5px;color:#64748b">DO Date: <strong style="color:#1e293b">${fmtDate(doc.date)}</strong></div>
    </div>
  </div>
  <div style="padding:0 28px 8px">
    <table style="width:100%;border-collapse:collapse;font-size:11.5px">
      <thead>
        <tr style="background:${accentColor};color:#fff">
          <th style="padding:7px 7px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;width:30px">#</th>
          <th style="padding:7px 7px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase">Description of Goods</th>
          <th style="padding:7px 7px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;width:50px">Qty</th>
          <th style="padding:7px 7px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;width:50px">Unit</th>
          <th style="padding:7px 7px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase">Notes</th>
          <th style="padding:7px 7px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;width:58px">Rcv'd &#10003;</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  ${doc.notes ? `<div style="padding:0 28px 6px"><div style="background:#fef3e0;border-left:3px solid #e8a020;border-radius:3px;padding:6px 12px;font-size:10.5px;color:#78350f"><strong>Notes:</strong> ${doc.notes}</div></div>` : ''}
  <div style="padding:0 28px 8px">
    <div style="border:1px dashed #cbd5e1;border-radius:6px;padding:6px 14px;font-size:10.5px;color:#64748b">
      <strong style="color:#334155">Goods received in good condition — quantity and description verified as stated above.</strong>
      Any discrepancy must be reported at the time of delivery.
    </div>
  </div>
  <div style="padding:6px 28px 10px;display:flex;justify-content:space-between;border-top:1px solid #e2e8f0">
    <div style="text-align:center">
      <div style="font-size:10px;color:#94a3b8;margin-bottom:1px">Dispatched by,</div>
      <div style="width:130px;border-bottom:1px solid #94a3b8;margin:36px auto 6px"></div>
      <div style="font-size:10.5px;font-weight:700;color:#334155">Mitra Agung Perkasa</div>
      <div style="font-size:10px;color:#94a3b8">Authorized Signature</div>
    </div>
    <div style="text-align:center">
      <div style="font-size:10px;color:#94a3b8;margin-bottom:1px">Driver / Courier,</div>
      <div style="width:130px;border-bottom:1px solid #94a3b8;margin:36px auto 6px"></div>
      <div style="font-size:10.5px;font-weight:700;color:#334155">________________</div>
      <div style="font-size:10px;color:#94a3b8">Name &amp; Signature</div>
    </div>
    <div style="text-align:center">
      <div style="font-size:10px;color:#94a3b8;margin-bottom:1px">Received by,</div>
      <div style="width:130px;border-bottom:1px solid #94a3b8;margin:36px auto 6px"></div>
      <div style="font-size:10.5px;font-weight:700;color:#334155">${doc.customer||'Customer'}</div>
      <div style="font-size:10px;color:#94a3b8">Name, Date &amp; Stamp</div>
    </div>
  </div>
  <div style="background:${accentColor};height:4px;width:100%"></div>
</div>`;
}

function buildDOHTML(doc) {
  const half1 = buildDOHalf(doc, 'CUSTOMER COPY', '#0369a1');
  const half2 = buildDOHalf(doc, 'INVOICE COPY',  '#166534');
  return `<div style="font-family:'Segoe UI',Arial,sans-serif;width:794px">
  ${half1}
  <div style="display:flex;align-items:center;gap:8px;padding:4px 20px;background:#f1f5f9;border-top:1.5px dashed #94a3b8;border-bottom:1.5px dashed #94a3b8;user-select:none">
    <span style="font-size:16px;color:#94a3b8">✂</span>
    <div style="flex:1;border-top:none"></div>
    <span style="font-size:9.5px;color:#94a3b8;font-weight:600;letter-spacing:.5px;white-space:nowrap">CUT HERE</span>
    <div style="flex:1"></div>
    <span style="font-size:16px;color:#94a3b8;transform:scaleX(-1);display:inline-block">✂</span>
  </div>
  ${half2}
</div>`;
}

/* ═══════════════════════════════════════
   NOTIFICATION
═══════════════════════════════════════ */
function showNotification(msg, type = 'success') {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;top:20px;right:24px;z-index:9999;background:${type==='success'?'#16a34a':'#dc2626'};color:#fff;padding:12px 20px;border-radius:8px;font-weight:600;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:opacity .3s`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
showPage('dashboard');
</script>
